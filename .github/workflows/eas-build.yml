name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform }} / ${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (preview — fire and forget)
        if: github.event.inputs.profile == 'preview'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile preview \
            --non-interactive \
            --no-wait

      - name: Build (production — wait for completion)
        if: github.event.inputs.profile == 'production'
        env:
          EAS_SKIP_AUTO_FINGERPRINT: "1"
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile production \
            --non-interactive \
            --clear-credentials \
            --wait

      - name: Submit iOS to App Store Connect
        if: github.event.inputs.profile == 'production' && github.event.inputs.platform == 'ios'
        run: |
          eas submit \
            --platform ios \
            --latest \
            --non-interactive
