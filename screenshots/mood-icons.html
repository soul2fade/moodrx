<title>MoodRx — Proposed Mood Icons</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    font-family: 'Space Mono', 'Courier New', monospace;
    gap: 64px;
  }
  .title { color: #404040; font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 220px);
    gap: 56px 40px;
    justify-items: center;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .label { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; }
  .concept { font-size: 9px; letter-spacing: 0.06em; text-align: center; line-height: 1.8; color: #525252; max-width: 160px; }
  .divider {
    width: 100%; max-width: 800px;
    border-top: 1px solid #1c1c1c; padding-top: 36px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .strip-label { color: #404040; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; }
  .strip { display: flex; gap: 40px; align-items: center; }
</style>
