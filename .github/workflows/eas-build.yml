name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform }} / ${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_SKIP_AUTO_FINGERPRINT: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (preview — fire and forget)
        if: github.event.inputs.profile == 'preview'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile preview \
            --non-interactive \
            --no-wait

      - name: Build (production — wait for completion)
        if: github.event.inputs.profile == 'production'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile production \
            --non-interactive \
            --wait

      - name: Submit iOS to TestFlight
        if: github.event.inputs.profile == 'production' && github.event.inputs.platform == 'ios'
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: |
          if [ -z "$ASC_APP_ID" ]; then
            echo ""
            echo "========================================="
            echo "BUILD SUCCEEDED — .ipa is on Expo dashboard"
            echo "========================================="
            echo ""
            echo "To enable auto-submit to TestFlight:"
            echo "  1. appstoreconnect.apple.com → My Apps"
            echo "  2. Create MoodRx (bundle: com.moodrx.app) if it doesn't exist"
            echo "  3. App Information page → copy the numeric Apple ID"
            echo "  4. GitHub repo → Settings → Secrets → add ASC_APP_ID"
            echo ""
            echo "Then re-trigger this workflow — submit will run automatically."
            exit 0
          fi
          node -e "
            const fs = require('fs');
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            eas.submit = eas.submit || {};
            eas.submit.production = eas.submit.production || {};
            eas.submit.production.ios = eas.submit.production.ios || {};
            eas.submit.production.ios.ascAppId = process.env.ASC_APP_ID;
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
            console.log('Set ascAppId:', process.env.ASC_APP_ID);
          "
          eas submit \
            --platform ios \
            --latest \
            --non-interactive
